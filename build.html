<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Build Your Jar</title>
<link rel="stylesheet" href="style.css">

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #fff7f8;
}

/* GLASS JAR */
.jar {
    width: 160px;
    height: 260px;
    margin: 25px auto;
    border-radius: 30px;
    border: 4px solid rgba(255,255,255,0.8);
    background: rgba(255,255,255,0.4);
    backdrop-filter: blur(8px);
    overflow: hidden;
    display: flex;
    flex-direction: column-reverse;
}

/* LAYERS */
.layer { width: 100%; transition: 0.3s; }

.base { height: 25%; background: #f5d6a1; }
.cream { height: 25%; background: #ffe4ec; }
.filling { height: 25%; background: #ff9aa8; }
.topping { height: 25%; background: #fff; }

select {
    padding: 10px;
    margin: 8px;
    border-radius: 10px;
}
h3 { color: #b35c6b; }
</style>

</head>

<body>

<header>
    <h1>Build Your Cake Jar 🫙</h1>
</header>

<div class="jar">
    <div class="layer topping" id="topping"></div>
    <div class="layer filling" id="filling"></div>
    <div class="layer cream" id="cream"></div>
    <div class="layer base" id="base"></div>
</div>

<h3>Base</h3>
<select onchange="base(this.value)">
    <option value="#f5d6a1">Vanilla</option>
    <option value="#5a3a2e">Chocolate</option>
    <option value="#c14444">Red Velvet</option>
</select>

<h3>Cream</h3>
<select onchange="cream(this.value)">
    <option value="#ffe4ec">Vanilla</option>
    <option value="#ffb6c1">Berry</option>
</select>

<h3>Filling</h3>
<select onchange="fill(this.value)">
    <option value="#ff6b81">Strawberry</option>
    <option value="#6d4c41">Chocolate</option>
</select>

<h3>Topping</h3>
<select onchange="top(this.value)">
    <option value="#ffffff">Classic</option>
    <option value="#fdcb6e">Crunch</option>
</select>

<script>
function base(c){document.getElementById("base").style.background=c;}
function cream(c){document.getElementById("cream").style.background=c;}
function fill(c){document.getElementById("filling").style.background=c;}
function top(c){document.getElementById("topping").style.background=c;}
</script>

</body>
</html>
