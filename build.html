<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Build Your Jar - Layers by Luise</title>
<link rel="stylesheet" href="style.css">

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #fff7f8;
    margin: 0;
}

/* HEADER */
header {
    background: #ffd6dc;
    padding: 20px;
}

/* JAR WRAPPER */
.jar {
    width: 160px;
    height: 260px;
    margin: 30px auto;
    border-radius: 30px 30px 45px 45px;
    border: 4px solid rgba(255,255,255,0.8);
    background: rgba(255,255,255,0.4);
    backdrop-filter: blur(6px);
    overflow: hidden;
    display: flex;
    flex-direction: column-reverse;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
}

/* LAYERS */
.layer {
    width: 100%;
    transition: 0.4s ease;
}

/* soft pastel defaults */
.base { height: 25%; background: #f5d6a1; }
.cream { height: 25%; background: #ffe4ec; }
.filling { height: 25%; background: #ff9aa8; }
.topping { height: 25%; background: #ffffff; }

/* CONTROLS */
section {
    padding: 10px;
}

select {
    padding: 10px;
    margin: 8px;
    border-radius: 12px;
    border: 1px solid #ddd;
    background: white;
}

/* LABELS */
h3 {
    margin-top: 20px;
    color: #b35c6b;
}
</style>

</head>

<body>

<header>
    <h1>Build Your Cake Jar 🫙</h1>
    <p>Watch your dessert come to life</p>
</header>

<div class="jar">
    <div class="layer topping" id="topping"></div>
    <div class="layer filling" id="filling"></div>
    <div class="layer cream" id="cream"></div>
    <div class="layer base" id="base"></div>
</div>

<section>

<h3>Cake Base</h3>
<select onchange="updateBase(this.value)">
    <option value="#f5d6a1">Vanilla Sponge</option>
    <option value="#5a3a2e">Chocolate Sponge</option>
    <option value="#c14444">Red Velvet</option>
    <option value="#f7e7a9">Lemon Sponge</option>
    <option value="#c49a6c">Hazelnut</option>
</select>

<h3>Cream</h3>
<select onchange="updateCream(this.value)">
    <option value="#ffe4ec">Vanilla Buttercream</option>
    <option value="#d6a4a4">Chocolate Cream</option>
    <option value="#ffb6c1">Berry Cream</option>
    <option value="#fff0d9">White Chocolate</option>
    <option value="#e6c7a1">Caramel Cream</option>
</select>

<h3>Filling</h3>
<select onchange="updateFilling(this.value)">
    <option value="#ff6b81">Strawberry Compote</option>
    <option value="#a29bfe">Wild Berry</option>
    <option value="#e84393">Raspberry Jam</option>
    <option value="#6d4c41">Chocolate Ganache</option>
    <option value="#d4a373">Cookie Crumble</option>
</select>

<h3>Topping</h3>
<select onchange="updateTopping(this.value)">
    <option value="#ffffff">Classic Cream Top</option>
    <option value="#ff7675">Berry Drizzle</option>
    <option value="#2d3436">Chocolate Shavings</option>
    <option value="#fdcb6e">Cookie Crunch</option>
</select>

</section>

<script>
function updateBase(color) {
    document.getElementById("base").style.background = color;
}

function updateCream(color) {
    document.getElementById("cream").style.background = color;
}

function updateFilling(color) {
    document.getElementById("filling").style.background = color;
}

function updateTopping(color) {
    document.getElementById("topping").style.background = color;
}
</script>

</body>
</html>
