<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Build Your Jar</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Inter, sans-serif;
    background:#fff7f8;
    text-align:center;
}

/* HEADER */
header{
    background:#ffd6dc;
    padding:20px;
    font-family:"Playfair Display", serif;
}

/* CENTER LAYOUT */
.container{
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
}

/* GLASS JAR (FIXED ORIENTATION) */
.jar{
    width:180px;
    height:280px;
    border-radius:40px;
    border:4px solid rgba(255,255,255,0.8);
    background:rgba(255,255,255,0.35);
    backdrop-filter:blur(10px);
    box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
    overflow:hidden;
    display:flex;
    flex-direction:column;
    position:relative;
}

/* glass shine */
.jar::before{
    content:"";
    position:absolute;
    left:10px;
    top:0;
    width:40%;
    height:100%;
    background:rgba(255,255,255,0.25);
}

/* LAYERS */
.layer{
    flex:1;
    transition:all 0.5s ease;
}

/* default colors */
.base{background:#f5d6a1;}
.cream{background:#ffe4ec;}
.filling{background:#ff9aa8;}
.topping{background:#ffffff;}

/* SELECTS */
select{
    padding:10px;
    margin:6px;
    border-radius:10px;
    border:1px solid #ddd;
}

/* PRICE */
.price{
    margin:15px;
    font-size:20px;
    color:#b35c6b;
}

/* BUTTON */
button{
    padding:12px 18px;
    border:none;
    border-radius:20px;
    background:#ffb6c1;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#ff9aa8;
}
</style>

</head>

<body>

<header>
<h1>Build Your Cake Jar 🫙</h1>
</header>

<div class="container">

<!-- JAR -->

<div class="jar">
    <div class="layer base" id="base"></div>
    <div class="layer cream" id="cream"></div>
    <div class="layer filling" id="filling"></div>
    <div class="layer topping" id="topping"></div>
</div>

<div class="price">Price: €<span id="price">6.00</span></div>

<!-- BASE -->

<h3>Base</h3>
<select onchange="setBase(this.value)">
    <option value="vanilla">Vanilla</option>
    <option value="chocolate">Chocolate</option>
    <option value="red">Red Velvet</option>
</select>

<!-- CREAM -->

<h3>Cream</h3>
<select onchange="setCream(this.value)">
    <option value="vanilla">Vanilla Buttercream</option>
    <option value="berry">Berry Cream</option>
</select>

<!-- FILLING -->

<h3>Filling</h3>
<select onchange="setFilling(this.value)">
    <option value="strawberry">Strawberry</option>
    <option value="chocolate">Chocolate</option>
</select>

<!-- TOPPING -->

<h3>Topping</h3>
<select onchange="setTopping(this.value)">
    <option value="classic">Classic</option>
    <option value="crunch">Crunch</option>
</select>

<!-- ACTIONS -->

<button onclick="goOrder()">Order This Jar</button>

<br><br>

<button onclick="setLang('en')">EN</button> <button onclick="setLang('de')">DE</button>

</div>

<script>

let price = 6;

function updatePrice(){
    document.getElementById("price").innerText = price.toFixed(2);
}

/* COLORS */
function setBase(v){
    document.getElementById("base").style.background =
        v==="vanilla"?"#f5d6a1":v==="chocolate"?"#5a3a2e":"#c14444";
    price = 6;
    updatePrice();
}

function setCream(v){
    document.getElementById("cream").style.background =
        v==="vanilla"?"#ffe4ec":"#ffb6c1";
    price += 0.5;
    updatePrice();
}

function setFilling(v){
    document.getElementById("filling").style.background =
        v==="strawberry"?"#ff6b81":"#6d4c41";
    price += 0.5;
    updatePrice();
}

function setTopping(v){
    document.getElementById("topping").style.background =
        v==="classic"?"#ffffff":"#fdcb6e";
    price += 0.5;
    updatePrice();
}

/* ORDER BUTTON */
function goOrder(){
    window.location.href="index.html#order";
}

/* LANGUAGE FIX */
function setLang(lang){
    const labels = document.querySelectorAll("h3");
    if(lang==="de"){
        labels[0].innerText="Boden";
        labels[1].innerText="Creme";
        labels[2].innerText="Füllung";
        labels[3].innerText="Topping";
    } else {
        labels[0].innerText="Base";
        labels[1].innerText="Cream";
        labels[2].innerText="Filling";
        labels[3].innerText="Topping";
    }
}

</script>

</body>
</html>
