<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Build Your Jar</title>
<link rel="stylesheet" href="style.css">

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #fff7f8;
}

/* HEADER */
header {
    background: #ffd6dc;
    padding: 15px;
}

/* LANGUAGE */
.lang {
    margin: 10px;
}

/* JAR */
.jar {
    width: 170px;
    height: 270px;
    margin: 20px auto;
    border-radius: 35px;
    border: 4px solid rgba(255,255,255,0.8);
    background: rgba(255,255,255,0.35);
    backdrop-filter: blur(10px);
    box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
    overflow: hidden;
    display: flex;
    flex-direction: column-reverse;
    position: relative;
}

/* GLASS SHINE */
.jar::before {
    content: "";
    position: absolute;
    width: 40%;
    height: 100%;
    left: 0;
    background: rgba(255,255,255,0.25);
}

/* LAYERS */
.layer {
    width: 100%;
    transition: all 0.5s ease;
}

.base { height: 25%; background: #f5d6a1; }
.cream { height: 25%; background: #ffe4ec; }
.filling { height: 25%; background: #ff9aa8; }
.topping { height: 25%; background: #fff; }

/* UI */
select {
    padding: 10px;
    margin: 8px;
    border-radius: 10px;
}

.price {
    font-size: 20px;
    margin: 10px;
    color: #b35c6b;
}
</style>

</head>

<body>

<header>
    <h1>Build Your Cake Jar 🫙</h1>

```
<div class="lang">
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('de')">DE</button>
</div>
```

</header>

<div class="jar">
    <div class="layer topping" id="topping"></div>
    <div class="layer filling" id="filling"></div>
    <div class="layer cream" id="cream"></div>
    <div class="layer base" id="base"></div>
</div>

<div class="price">
    Price: €<span id="price">6.00</span>
</div>

<h3 id="t1">Base</h3>
<select onchange="base(this.value)">
    <option value="6">Vanilla</option>
    <option value="6">Chocolate</option>
    <option value="7.5">Red Velvet (+€1.5)</option>
</select>

<h3 id="t2">Cream</h3>
<select onchange="cream(this.value)">
    <option value="0">Vanilla</option>
    <option value="0.5">Berry (+€0.5)</option>
</select>

<h3 id="t3">Filling</h3>
<select onchange="fill(this.value)">
    <option value="0">Strawberry</option>
    <option value="0.5">Chocolate (+€0.5)</option>
</select>

<h3 id="t4">Topping</h3>
<select onchange="top(this.value)">
    <option value="0">Classic</option>
    <option value="0.5">Crunch (+€0.5)</option>
</select>

<script>
let price = 6;

function updatePrice() {
    document.getElementById("price").innerText = price.toFixed(2);
}

function base(val){
    price = 6;
    updatePrice();
    document.getElementById("base").style.background =
        val == 6 ? "#f5d6a1" : "#c14444";
    price = parseFloat(val) + 1;
    updatePrice();
}

function cream(val){
    price += parseFloat(val);
    updatePrice();
    document.getElementById("cream").style.background =
        val == 0 ? "#ffe4ec" : "#ffb6c1";
}

function fill(val){
    price += parseFloat(val);
    updatePrice();
    document.getElementById("filling").style.background =
        val == 0 ? "#ff9aa8" : "#6d4c41";
}

function top(val){
    price += parseFloat(val);
    updatePrice();
    document.getElementById("topping").style.background =
        val == 0 ? "#fff" : "#fdcb6e";
}

/* LANGUAGE */
function setLang(lang){
    if(lang === "de"){
        document.getElementById("t1").innerText = "Boden";
        document.getElementById("t2").innerText = "Creme";
        document.getElementById("t3").innerText = "Füllung";
        document.getElementById("t4").innerText = "Topping";
    } else {
        document.getElementById("t1").innerText = "Base";
        document.getElementById("t2").innerText = "Cream";
        document.getElementById("t3").innerText = "Filling";
        document.getElementById("t4").innerText = "Topping";
    }
}
</script>

</body>
</html>
